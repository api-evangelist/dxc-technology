naftiko: 1.0.0-alpha2
info:
  label: DXC Developer Central API
  description: The DXC Developer Central provides APIs and tools for building and integrating with DXC Technology's enterprise
    platform services. The portal offers open APIs with modular architecture and flexible connectivity designed to reduce
    legacy dependencies and ensure scalability across various technology environments.
  tags:
  - Dxc
  - Technology
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: dxc-technology
    baseUri: https://developer.dxc.com/api
    description: DXC Developer Central API HTTP API.
    authentication:
      type: bearer
      token: '{{DXC_TECHNOLOGY_TOKEN}}'
    resources:
    - name: services
      path: /services
      operations:
      - name: listservices
        method: GET
        description: List available services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: integrations
      path: /integrations
      operations:
      - name: listintegrations
        method: GET
        description: List integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: dxc-technology-rest
    description: REST adapter for DXC Developer Central API.
    resources:
    - path: /services
      name: listservices
      operations:
      - method: GET
        name: listservices
        description: List available services
        call: dxc-technology.listservices
        outputParameters:
        - type: object
          mapping: $.
    - path: /integrations
      name: listintegrations
      operations:
      - method: GET
        name: listintegrations
        description: List integrations
        call: dxc-technology.listintegrations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: dxc-technology-mcp
    transport: http
    description: MCP adapter for DXC Developer Central API for AI agent use.
    tools:
    - name: listservices
      description: List available services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dxc-technology.listservices
      outputParameters:
      - type: object
        mapping: $.
    - name: listintegrations
      description: List integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dxc-technology.listintegrations
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    DXC_TECHNOLOGY_TOKEN: DXC_TECHNOLOGY_TOKEN
