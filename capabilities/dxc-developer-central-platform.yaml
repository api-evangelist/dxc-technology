naftiko: 1.0.0-alpha2
info:
  label: DXC Developer Central API — Platform
  description: 'DXC Developer Central API — Platform. 1 operations. Lead operation: List available services. Self-contained
    Naftiko capability covering one Dxc Technology business surface.'
  tags:
  - Dxc Technology
  - Platform
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DXC_TECHNOLOGY_API_KEY: DXC_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: dxc-developer-central-platform
    baseUri: https://developer.dxc.com/api
    description: DXC Developer Central API — Platform business capability. Self-contained, no shared references.
    resources:
    - name: services
      path: /services
      operations:
      - name: listservices
        method: GET
        description: List available services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DXC_TECHNOLOGY_API_KEY}}'
  exposes:
  - type: rest
    namespace: dxc-developer-central-platform-rest
    port: 8080
    description: REST adapter for DXC Developer Central API — Platform. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/services
      name: services
      description: REST surface for services.
      operations:
      - method: GET
        name: listservices
        description: List available services
        call: dxc-developer-central-platform.listservices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dxc-developer-central-platform-mcp
    port: 9090
    transport: http
    description: MCP adapter for DXC Developer Central API — Platform. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-available-services
      description: List available services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dxc-developer-central-platform.listservices
      outputParameters:
      - type: object
        mapping: $.
