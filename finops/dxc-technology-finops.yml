specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: DXC Technology
providerId: dxc-technology
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - IT Services
  - Enterprise
description: 'FOCUS-aligned FinOps shell for DXC Technology API surface; pricing is contracted, not
  publicly metered, so meters and FOCUS columns are placeholders pending direct invoice review.'
notes: DXC Technology does not publish public API pricing. FinOps mapping should be reconciled against
  the actual managed-services agreement and invoice line items.
sources:
  - https://developer.dxc.com/
  - https://dxc.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: DXC Technology Company
serviceCategory: IT Services
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: DXC Developer Central
  ServiceCategory: IT Services
  ProviderName: DXC Technology
  PublisherName: DXC Technology Company
  InvoiceIssuerName: DXC Technology Company
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - consumer
  - name: managed_service_hours
    unit: hour
    aggregation: sum
    dimensions:
      - engagement
      - region
principles:
  - name: Visibility
    description: Request itemized usage reports from the DXC account team; integrate invoice line items
      into FOCUS-formatted tables.
  - name: Allocation
    description: Tag API consumers by engagement/cost-center and reconcile against the master services
      agreement.
  - name: Optimization
    description: Negotiate volume discounts at renewal; consolidate API consumers across business units
      to qualify for tier discounts.
  - name: Accountability
    description: Engagement owner reviews the monthly DXC invoice; flag deviations from baseline run-rate.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
