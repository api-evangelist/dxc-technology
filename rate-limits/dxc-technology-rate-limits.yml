specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: DXC Technology
providerId: dxc-technology
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - IT Services
  - Enterprise
description: DXC Technology does not publish a public rate-limit specification for the Developer Central
  API. Rate limits are negotiated per engagement and enforced at the API gateway. Consumers should follow
  standard rate-limit etiquette (Retry-After, exponential backoff) and confirm thresholds with their
  DXC contact.
notes: No public rate-limit numbers are published. Replace with provider-confirmed values once available.
sources:
  - https://developer.dxc.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: DXC Developer Central API
    scope: api-key
    metric: varies
    limit: contact provider for negotiated thresholds
policies:
  - name: Backoff
    description: Implement exponential backoff with jitter and honor Retry-After headers when present.
  - name: Negotiated thresholds
    description: Per-tenant rate-limit thresholds are part of the contractual engagement; raise via DXC
      account team.
maintainers:
